<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para mi Princesita 🌻❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    /* 🌻 FONDO CORREGIDO */
    background: url('Ochi.jpeg') no-repeat center center;
    background-size: cover;
}

/* Fondo oscuro suave */
.overlay {
    background: rgba(0,0,0,0.3);
    height: 100vh;
    padding-top: 50px;
}

h1 {
    color: yellow;
}

.container {
    display: flex;
    justify-content: space-around;
    margin-top: 40px;
    padding: 20px;
}

.box {
    width: 40%;
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    padding: 20px;
    min-height: 200px;
}

.flower {
    font-size: 60px;
}

/* Cursor tipo escritura */
.cursor::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0;}
    100% {opacity: 1;}
}
</style>
</head>

<body>

<div class="overlay">

<div class="flower">🌻🌻🌻</div>

<h1>Mi niña, tus flores amarillas 🌻❤️</h1>

<!-- 🎵 MÚSICA -->
<audio controls autoplay loop>
  <source src="pielcanela.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <!-- TEXTO 1 -->
    <div class="box">
        <p id="text1" class="cursor"></p>
    </div>

    <!-- TEXTO 2 -->
    <div class="box">
        <p id="text2" class="cursor"></p>
    </div>

</div>

</div>

<script>
// ✍️ CAMBIA AQUÍ TUS FRASES
let texto1 = "Aquí escribes tu primer mensaje bonito para ella...";
let texto2 = "Aquí va la segunda parte de tu mensaje romántico...";

function escribirTexto(id, texto, velocidad) {
    let i = 0;
    let elemento = document.getElementById(id);

    function escribir() {
        if (i < texto.length) {
            elemento.innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, velocidad);
        }
    }
    escribir();
}

// Ejecutar animación
escribirTexto("text1", texto1, 40);

setTimeout(() => {
    escribirTexto("text2", texto2, 40);
}, 2000);

</script>

</body>
</html>
