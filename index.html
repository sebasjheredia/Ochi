<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi Princesita 🌻❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("Ochi.jpeg") no-repeat center center/cover;
    overflow-x: hidden;
}

/* BOTÓN */
.start-btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: yellow;
    color: black;
    padding: 15px 25px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 9999;
}

/* CONTENIDO */
#contenido {
    display: none;
    animation: fade 2s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}

.container {
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

.box {
    width: 40%;
    background: rgba(0,0,0,0.4);
    padding: 20px;
    border-radius: 15px;
}

.video-box {
    width: 40%;
}

/* 🌻🌹💖 ANIMACIONES */
.fall {
    position: fixed;
    top: -10%;
    animation: caer linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-10%) translateX(0); opacity:1;}
    100% { transform: translateY(110vh) translateX(50px); opacity:0;}
}

/* 📸 GALERÍA TIPO INSTAGRAM */
.gallery {
    width: 300px;
    height: 300px;
    margin: 30px auto;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(255,255,255,0.3);
}

.gallery img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
}

.gallery img.active {
    opacity: 1;
}

/* RESPONSIVE */
@media (max-width:768px){
    .container {
        flex-direction: column;
        align-items: center;
    }
    .box, .video-box {
        width: 90%;
        margin-bottom: 20px;
    }
}
</style>
</head>

<body>

<div class="start-btn" onclick="iniciar()">💛 Toca aquí, amor 💛</div>

<audio id="musica" loop>
  <source src="pielcanela.mp3" type="audio/mpeg">
</audio>

<div id="contenido">

<h1 style="color: yellow; -webkit-text-stroke: 2px black;">
Flores Amarillas para ti mi amor 🌻❤️
</h1>

<div class="gallery">
  <img src="imagen1.jpeg">
  <img src="imagen2.jpeg">
  <img src="imagen3.jpeg">
  <img src="imagen4.jpeg">
  <img src="imagen5.jpeg">
  <img src="imagen6.jpeg">
  <img src="imagen7.jpeg">
  <img src="imagen8.jpeg">
</div>

<div class="container">

    <div class="box">
        <p id="text1"></p>
        <p id="text2"></p>
    </div>

    <div class="video-box">
        <video controls width="100%">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

</div>

</div>

<script>
// TEXTOS
let texto1 = `Eres el amor de mi vida y mi sol de cada mañana. ¡Feliz día de las flores amarillas!`;

let texto2 = `Mi amor, hoy es un día especial y no quería que pasara ni un minuto más sin recordarte lo inmensamente feliz que me haces. 
Te preparé este detalle con todo mi corazón porque, para mí, tú eres la luz que ilumina absolutamente todo en mi vida. 
Estas flores amarillas son solo un reflejo de esa alegría que me das desde el primer momento en que estamos juntos. 
Me encanta cada segundo que compartimos, desde las risas más tontas hasta los momentos en los que simplemente estamos acostaditos abrazados el uno al lado del otro. 
Tenerte a mi lado es el regalo más grande que la vida me ha dado; me fascina tu forma de ser, esa vibra tan bella que tienes (Ochi vibra), cómo me miras y esa esencia única que tienes que me hace elegirte una y mil veces más. 
Estar contigo es mi lugar favorito en el mundo y quiero que sepas que valoro cada instante que pasamos construyendo nuestra historia.
Quiero que estas flores te recuerden que, mientras yo esté a tu lado, nunca te van a faltar los detallitos, las golosinas (Dulces o saladas), la comidita, los viajes locos, los mimos y ese amor que siempre busca sacarte una sonrisa, es que me encanta hacerte reír... 
Me hace muy feliz consentirte y demostrarte lo mucho que te amo, porque te mereces eso y mucho más. Eres mi prioridad, mi novia hermosa y la mujer que me motiva a ser mejor cada día.
Gracias por caminar conmigo, por compartir tu tiempo y por dejarme amarte de esta forma tan real y bonita. Disfruta mucho de tus flores, mi reina, que son tan brillantes y hermosas como tú.
Te amo con todo mi corazón, hoy y siempre. ❤️`;

// ESCRITURA
function escribir(id,texto){
    let i=0;
    let el=document.getElementById(id);
    function t(){
        if(i<texto.length){
            el.innerHTML+=texto[i];
            i++;
            setTimeout(t,10);
        }
    }
    t();
}

// 🌻🌹💖 ANIMACIONES
function crearElementos(){
    let emojis=["🌻","🌹","💖"];
    for(let i=0;i<40;i++){
        let e=document.createElement("div");
        e.classList.add("fall");
        e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
        e.style.left=Math.random()*100+"vw";
        e.style.fontSize=(20+Math.random()*30)+"px";
        e.style.animationDuration=(5+Math.random()*5)+"s";
        document.body.appendChild(e);
    }
}

// 📸 GALERÍA JS
let index = 0;
let images = document.querySelectorAll(".gallery img");

function cambiarImagen() {
    images.forEach(img => img.classList.remove("active"));
    images[index].classList.add("active");

    index++;
    if(index >= images.length){
        index = 0;
    }
}

// INICIO
function iniciar(){
    document.querySelector(".start-btn").style.display = "none";
    document.getElementById("contenido").style.display = "block";

    let audio = document.getElementById("musica");
    if(audio){
        audio.play().catch(()=>{});
    }

    crearElementos();
    escribir("text1", texto1);

    setTimeout(()=>{
        escribir("text2", texto2);
    },2000);

    // iniciar galería
    cambiarImagen();
    setInterval(cambiarImagen, 3000);
}
</script>

</body>
</html>
